<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#ffaef6" />

		<!-- Pre-launch: block search engines. Remove this tag (and update static/robots.txt) when going public. -->
		<meta name="robots" content="noindex, nofollow" />

		<title>omind — underground rap, electronic, experimental</title>
		<meta
			name="description"
			content="A 3D globe of underground rap, electronic, and experimental artists. Explore by country, dive into curated playlists and articles."
		/>

		<!-- Open Graph / Twitter defaults (per-page tags override) -->
		<meta property="og:site_name" content="omind" />
		<meta property="og:type" content="website" />
		<meta property="og:title" content="omind — underground rap, electronic, experimental" />
		<meta
			property="og:description"
			content="A 3D globe of underground rap, electronic, and experimental artists. Explore by country, dive into curated playlists and articles."
		/>
		<meta property="og:image" content="/assets/images/logo-0mind-removed-bg.png" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="omind — underground rap, electronic, experimental" />
		<meta
			name="twitter:description"
			content="A 3D globe of underground rap, electronic, and experimental artists."
		/>
		<meta name="twitter:image" content="/assets/images/logo-0mind-removed-bg.png" />

		<link rel="icon" type="image/png" href="/assets/icon-192.png" />
		<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
