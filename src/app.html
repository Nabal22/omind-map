<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#ffaef6" />

		<!-- Pre-launch: block search engines. Remove this tag (and update static/robots.txt) when going public. -->
		<meta name="robots" content="noindex, nofollow" />

		<title>Omind — worldwide hip-hop, underground rap, and more</title>
		<meta
			name="description"
			content="A french take on worldwide hip-hop and more. Explore underground rap, dive into interviews."
		/>

		<!-- Open Graph defaults (per-page tags override) -->
		<meta property="og:site_name" content="Omind" />
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Omind — worldwide hip-hop, underground rap, and more" />
		<meta
			property="og:description"
			content="A french take on worldwide hip-hop and more. Explore underground rap, dive into interviews."
		/>
		<meta property="og:image" content="/assets/images/logo-0mind-removed-bg.png" />

		<link rel="icon" type="image/png" href="/assets/icon-192.png" />
		<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
